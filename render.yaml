services:
  - type: web
    name: yandex-disk-tg-bot
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: YANDEX_DISK_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_CONCURRENT_UPLOADS
        value: "5"